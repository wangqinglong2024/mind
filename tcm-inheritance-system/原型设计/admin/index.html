<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>表单中台 · 搭建端</title>
<link rel="stylesheet" href="../shared/theme.css">
<style>
  .layout{display:flex;height:calc(100vh - 56px)}
  .cats{width:210px;flex:none;background:#fff;border-right:1px solid var(--border);overflow:auto;padding:12px}
  .cats-h{display:flex;justify-content:space-between;align-items:center;font-weight:600;font-size:14px;padding:4px 6px 10px;color:#41506a}
  .cat{display:flex;align-items:center;gap:6px;padding:9px 10px;border-radius:6px;cursor:pointer;font-size:14px;color:#41506a}
  .cat:hover{background:var(--hover)}
  .cat.active{background:var(--primary-l);color:var(--primary);font-weight:600}
  .cat .nm{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .cat .ci{opacity:0;font-size:12px;color:#8a97a8}
  .cat:hover .ci{opacity:1}
  .cat .ci:hover{color:var(--primary)}
  .main{flex:1;overflow:auto;padding:18px 22px}
  .bar{display:flex;gap:10px;align-items:center;margin-bottom:14px;flex-wrap:wrap}
  .bar .grow{flex:1}
  .in{border:1px solid var(--border-d);border-radius:6px;padding:8px 10px;font-size:13px;background:#fff}
  .banner{background:#fff6e8;color:#c77b12;padding:8px 14px;font-size:13px;border-bottom:1px solid #f0e0c4;text-align:center;position:relative}
  .banner .back{position:absolute;left:14px;top:7px}
</style>
</head>
<body>
<div class="mj-top">
  <div class="mj-logo"><span class="dot"></span>脉景 <span class="accent">表单中台</span></div>
  <div class="mj-menu"><a class="active">表单设置</a><a href="../app/index.html">应用端数据</a></div>
  <div class="mj-user"><span class="av"></span><span>张三</span></div>
</div>

<!-- ============ 列表视图（类目 + 表单模板） ============ -->
<div id="listView" class="layout">
  <div class="cats">
    <div class="cats-h"><span>类目</span><span class="link" onclick="addCat()">＋ 类目</span></div>
    <div id="catList"></div>
  </div>
  <div class="main">
    <h2 id="catTitle" style="margin:2px 0 14px;font-size:18px"></h2>
    <div class="bar">
      <input id="fTitle" class="in" placeholder="🔍 表单标题" style="width:200px" oninput="renderList()">
      <select id="fStatus" class="in ctrl" style="width:160px" onchange="renderList()">
        <option value="">发布状态（全部）</option>
        <option value="published">已发布</option>
        <option value="unpublished">已下架</option>
        <option value="draft">草稿</option>
      </select>
      <input id="fFrom" type="date" class="in" onchange="renderList()">
      <span style="color:#8a97a8">~</span>
      <input id="fTo" type="date" class="in" onchange="renderList()">
      <div class="grow"></div>
      <button class="btn primary" onclick="newForm()">＋ 创建表单</button>
    </div>
    <div class="panel">
      <table class="tbl">
        <thead><tr>
          <th>表单标题</th><th style="width:140px">发布状态</th>
          <th style="width:90px">创建人</th><th style="width:160px">创建时间</th><th style="width:260px">操作</th>
        </tr></thead>
        <tbody id="listBody"></tbody>
      </table>
    </div>
  </div>
</div>

<!-- ============ 搭建器视图（中台） ============ -->
<div id="builderView" style="display:none">
  <div id="roBanner" class="banner" style="display:none"><span class="link back" onclick="exitBuilder()">← 返回列表</span><span id="roText">注：表单已发布，无法修改</span></div>
  <div class="bd">
    <div class="bd-left" id="palette"></div>
    <div class="bd-mid">
      <div class="cv">
        <input id="cvTitle" class="cv-title" maxlength="20" placeholder="请输入表单标题（填写者不可见）" oninput="onTitle(this.value)">
        <div class="pg-tabs" id="pgTabs"></div>
        <input id="cvTheme" class="cv-theme" maxlength="50" placeholder="请输入当前页主题（填写者可见）" oninput="onTheme(this.value)">
        <div id="canvas"></div>
      </div>
      <div id="bdFoot" style="width:820px;max-width:100%;margin:16px auto 0;display:flex;justify-content:space-between;align-items:center"></div>
    </div>
    <div class="bd-right" id="props"></div>
  </div>
</div>

<!-- 关联弹窗 -->
<div id="linkMask" class="mask" style="display:none">
  <div class="modal" style="width:440px">
    <div class="m-h">关联 <span class="x" onclick="closeLink()">×</span></div>
    <div class="m-b">
      <div class="err" style="margin-bottom:10px">说明：症状或疾病，可任选 1 个关联，作为题目的选项</div>
      <div class="field"><label>搜索症状</label><input id="lkSym" class="ctrl" placeholder="请输入症状名、拼音"></div>
      <div class="field"><label>搜索疾病</label><input id="lkDis" class="ctrl" placeholder="请输入疾病名、拼音"></div>
      <div class="field"><label>显示名</label><input id="lkShow" class="ctrl" maxlength="10" placeholder="请输入展示给填写人的名称"></div>
      <div id="lkErr" class="err"></div>
    </div>
    <div class="m-f"><button class="btn" onclick="closeLink()">取消</button><button class="btn primary" onclick="confirmLink()">确定</button></div>
  </div>
</div>

<!-- 通用确认 / 输入弹窗 -->
<div id="cfMask" class="mask" style="display:none">
  <div class="modal" style="width:360px">
    <div class="m-h" id="cfTitle">提示 <span class="x" onclick="cfClose(false)">×</span></div>
    <div class="m-b"><div id="cfText"></div><input id="cfInput" class="ctrl" style="margin-top:10px;display:none"></div>
    <div class="m-f"><button class="btn" onclick="cfClose(false)">取消</button><button class="btn primary" onclick="cfClose(true)">确定</button></div>
  </div>
</div>

<script src="../shared/store.js"></script>
<script src="../shared/engine.js"></script>
<script>
const S = MJ.Store, E = MJ.Engine;
let cur=null, curPage=0, curCardId=null, selId=null, readonly=false, linkCtx=null, curCat=null, openAddCard=null;

/* 右栏属性 schema（题目标题在中间画布编辑，此处不含标题、不含选项） */
const PROPS = {
  text:     [['placeholder','占位提示','text'],['default','默认值','text'],['minLen','最小长度','number'],['maxLen','最大长度','number'],['format','格式校验','select',[['','无'],['phone','手机号'],['idcard','身份证'],['email','邮箱'],['digit','纯数字']]]],
  textarea: [['placeholder','占位提示','text'],['default','默认值','text'],['maxLen','最大字数','number'],['rows','默认行数','number']],
  number:   [['placeholder','占位提示','text'],['default','默认值','number'],['min','最小值','number'],['max','最大值','number'],['decimals','小数位数','number'],['unit','单位','text']],
  date:     [['precision','日期精度','select',[['date','年月日'],['datetime','年月日时分']]],['defaultToday','默认当天','switch']],
  image:    [['imgMax','数量上限','number'],['imgSizeMb','单张大小上限(MB)','number']],
  tags:     [['maxTags','最多标签数','number'],['allowRepeat','允许重复','switch']],
  radio:        [['allowClear','允许清空','switch']],
  radioScore:   [['allowClear','允许清空','switch']],
  checkbox:     [['minSel','最少选择数','number'],['maxSel','最多选择数','number']],
  checkboxScore:[['minSel','最少选择数','number'],['maxSel','最多选择数','number']],
  richtext: [['placeholder','占位提示','text']],
  subtable: [],
};

/* ---------- 自定义确认 / 输入 ---------- */
let cfCb=null;
function confirmBox(text){ return new Promise(res=>{ cfCb=res; document.getElementById('cfText').textContent=text; document.getElementById('cfInput').style.display='none'; document.getElementById('cfMask').style.display='flex'; }); }
function promptBox(text, val){ return new Promise(res=>{ cfCb=res; document.getElementById('cfText').textContent=text; const inp=document.getElementById('cfInput'); inp.style.display='block'; inp.value=val||''; document.getElementById('cfMask').style.display='flex'; setTimeout(()=>inp.focus(),0); }); }
function cfClose(v){ const inp=document.getElementById('cfInput'); const isInput=inp.style.display!=='none'; document.getElementById('cfMask').style.display='none'; if(cfCb){ cfCb(v ? (isInput? inp.value.trim() : true) : false); cfCb=null; } }
function toast(t){ const d=document.createElement('div'); d.textContent=t; d.style.cssText='position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#2f3b4c;color:#fff;padding:9px 18px;border-radius:6px;z-index:200;font-size:13px'; document.body.appendChild(d); setTimeout(()=>d.remove(),1600); }

/* ================= 类目 ================= */
function renderCats(){
  const cs=S.getCategories(); if(!curCat && cs.length) curCat=cs[0].id;
  document.getElementById('catList').innerHTML = cs.map(c=>`
    <div class="cat ${c.id===curCat?'active':''}" onclick="selectCat('${c.id}')">
      <span class="nm">${E.esc(c.name)}</span>
      <span class="ci" onclick="event.stopPropagation();renameCat('${c.id}')">✎</span>
      <span class="ci" onclick="event.stopPropagation();delCat('${c.id}')">🗑</span>
    </div>`).join('') || '<div class="hint" style="padding:8px">暂无类目</div>';
  const c=cs.find(x=>x.id===curCat);
  document.getElementById('catTitle').textContent = c? c.name+' · 表单' : '表单设置';
}
function selectCat(id){ curCat=id; renderCats(); renderList(); }
async function addCat(){ const n=await promptBox('新建类目名称'); if(n){ S.addCategory(n); const cs=S.getCategories(); curCat=cs[cs.length-1].id; renderCats(); renderList(); } }
async function renameCat(id){ const c=S.getCategories().find(x=>x.id===id); const n=await promptBox('修改类目名称', c.name); if(n){ S.renameCategory(id,n); renderCats(); } }
async function delCat(id){ if(S.formsByCategory(id).length){ await confirmBox('该类目下存在表单，请先删除或移走表单'); return; } if(await confirmBox('确认删除该类目？')){ S.deleteCategory(id); if(curCat===id)curCat=null; renderCats(); renderList(); } }

/* ================= 表单列表 ================= */
function fmt(ts){ const d=new Date(ts); const p=n=>('0'+n).slice(-2); return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}`; }
/* 发布状态仅作展示（不可直接切换），发布/下架/隐藏/删除统一在“操作”列 */
function statusTag(f){
  if(f.status==='draft') return `<span class="tag gray">草稿</span>`;
  if(f.status==='published') return `<span class="tag info">已发布</span>`;
  return `<span class="tag warn">已下架</span>`;
}
function renderList(){
  const kw=document.getElementById('fTitle').value.trim();
  const st=document.getElementById('fStatus').value;
  const from=document.getElementById('fFrom').value, to=document.getElementById('fTo').value;
  let fs=S.formsByCategory(curCat).filter(f=>{
    if(kw && !(f.title||'').includes(kw)) return false;
    if(st && f.status!==st) return false;
    if(from && f.createdAt < new Date(from).getTime()) return false;
    if(to && f.createdAt > new Date(to).getTime()+86400000) return false;
    return true;
  }).sort((a,b)=>b.createdAt-a.createdAt);
  document.getElementById('listBody').innerHTML = fs.map(f=>{
    let ops=[];
    if(f.status==='draft'){
      ops.push(`<span class="link" onclick="editForm('${f.id}')">编辑</span>`);
      ops.push(`<span class="link" onclick="confirmDeploy('${f.id}')">发布</span>`);
      ops.push(`<span class="link" onclick="copyForm('${f.id}')">复制</span>`);
      ops.push(`<span class="link danger" onclick="delForm('${f.id}')">删除</span>`);
    } else if(f.status==='published'){
      ops.push(`<span class="link" onclick="editForm('${f.id}')">查看</span>`);
      ops.push(`<span class="link" onclick="offlineForm('${f.id}')">下架</span>`);
      ops.push(`<span class="link" onclick="copyForm('${f.id}')">复制</span>`);
    } else { /* unpublished 已下架：禁止再次发布 */
      ops.push(`<span class="link" onclick="editForm('${f.id}')">查看</span>`);
      ops.push(f.hidden
        ? `<span class="link" onclick="toggleHide('${f.id}')">显示数据</span>`
        : `<span class="link" onclick="toggleHide('${f.id}')">隐藏数据</span>`);
      ops.push(`<span class="link" onclick="copyForm('${f.id}')">复制</span>`);
      ops.push(`<span class="link danger" onclick="delForm('${f.id}')">删除数据</span>`);
    }
    return `<tr>
      <td><a onclick="editForm('${f.id}')" style="cursor:pointer">${E.esc(f.title)||'（未命名）'}</a></td>
      <td>${statusTag(f)}</td><td>${E.esc(f.createdBy)}</td><td>${fmt(f.createdAt)}</td>
      <td>${ops.join('')}</td></tr>`;
  }).join('') || `<tr><td colspan="5" style="text-align:center;color:#8a97a8;padding:30px">该类目暂无表单，点右上角「创建表单」</td></tr>`;
}
async function confirmDeploy(id){ if(await confirmBox('确认发布该表单？发布后不可再编辑内容。')){ const f=S.getForm(id); f.status='published'; f.hidden=false; S.saveForm(f); renderList(); toast('已发布'); } }
async function offlineForm(id){ if(await confirmBox('下架后该表单将停止采集，且不可再重新发布。确认下架？')){ const f=S.getForm(id); f.status='unpublished'; f.hidden=false; S.saveForm(f); renderList(); toast('已下架，不影响已收到的数据'); } }
async function toggleHide(id){ const f=S.getForm(id);
  const msg = f.hidden ? '确认重新显示该表单的数据？显示后应用端可再次查看。' : '隐藏后应用端数据列表将不再展示该表单及其数据，确认隐藏？';
  if(!(await confirmBox(msg))) return;
  f.hidden=!f.hidden; S.saveForm(f); renderList(); toast(f.hidden?'已隐藏数据':'已显示数据'); }
async function delForm(id){ const f=S.getForm(id);
  const warn = f.status==='draft' ? '确认删除该草稿？' : '将彻底删除该表单及其采集到的全部数据，且不可恢复。确认删除？';
  if(await confirmBox(warn)){ S.deleteForm(id); renderList(); toast('已删除'); } }
function copyForm(id){ const src=S.getForm(id); const f=JSON.parse(JSON.stringify(src)); f.id=S.uid('form'); f.title=(src.title||'表单')+' - 副本'; f.status='draft'; f.hidden=false; f.createdAt=Date.now(); f.createdBy='张三'; S.saveForm(f); openBuilder(f.id); }

/* ================= 搭建器 ================= */
function newForm(){ if(!curCat){ confirmBox('请先创建并选择一个类目'); return; } const f=S.newForm(curCat); S.saveForm(f); openBuilder(f.id); }
function editForm(id){ openBuilder(id); }
function openBuilder(id){
  cur=JSON.parse(JSON.stringify(S.getForm(id))); curPage=0; selId=null; curCardId=cur.pages[0].cards[0].id;
  readonly = cur.status!=='draft';
  document.getElementById('listView').style.display='none';
  document.getElementById('builderView').style.display='block';
  document.getElementById('roBanner').style.display=readonly?'block':'none';
  document.getElementById('roText').textContent = cur.status==='published'?'注：表单已发布，无法修改（仅可预览）':'注：表单已下架，无法修改（仅可预览）';
  document.getElementById('cvTitle').disabled=readonly;
  document.getElementById('cvTheme').disabled=readonly;
  renderFoot();
  renderPalette(); renderAll();
}
function renderFoot(){
  const el=document.getElementById('bdFoot');
  if(readonly){
    el.innerHTML=`<div></div><div style="display:flex;gap:10px;align-items:center"><span class="hint">最近保存 ${fmt(cur.updatedAt)}（${E.esc(cur.updatedBy)}）</span><button class="btn primary" onclick="preview()">预览</button></div>`;
  } else {
    el.innerHTML=`<div style="display:flex;gap:10px"><button class="btn" onclick="exitBuilder()">退出编辑</button><button class="btn" onclick="resetForm()">重置</button></div>
      <div style="display:flex;gap:10px;align-items:center"><span class="hint" id="savedAt">最近保存 ${fmt(cur.updatedAt)}（${E.esc(cur.updatedBy)}）</span><button class="btn" onclick="preview()">预览</button><button class="btn primary" onclick="saveForm()">保存</button></div>`;
  }
}
function exitBuilder(){ const go=()=>{ document.getElementById('builderView').style.display='none'; document.getElementById('listView').style.display='flex'; renderList(); };
  if(readonly){ go(); return; }
  confirmBox('退出后未保存内容不会保留，确认退出？').then(ok=>{ if(ok) go(); }); }
async function resetForm(){ if(readonly) return; if(await confirmBox('将清空所有内容，确认重置？')){ const f=S.newForm(cur.categoryId); f.id=cur.id; f.status=cur.status; f.createdBy=cur.createdBy; f.createdAt=cur.createdAt; cur=f; curPage=0; selId=null; curCardId=cur.pages[0].cards[0].id; renderAll(); } }

function renderPalette(){
  document.getElementById('palette').innerHTML = S.GROUPS.map(g=>{
    const items=Object.keys(S.TYPES).filter(k=>S.TYPES[k].group===g);
    return `<div class="bd-grp"><div class="bd-grp-t">${g}</div><div class="bd-types">`+
      items.map(k=>`<div class="bd-type" draggable="${!readonly}" data-type="${k}" onclick="addType('${k}')" ondragstart="palDragStart(event,'${k}')">${S.TYPES[k].name}</div>`).join('')+
    `</div></div>`;
  }).join('');
}
let palType=null;
function palDragStart(e,t){ if(readonly){e.preventDefault();return;} palType=t; e.dataTransfer.effectAllowed='copy'; }
function currentCard(){ const pg=cur.pages[curPage]; return pg.cards.find(c=>c.id===curCardId) || pg.cards[pg.cards.length-1]; }
function addType(type){ if(readonly) return; const q=S.newQuestion(type); const c=currentCard(); c.questions.push(q); curCardId=c.id; selId=q.id; renderAll(); }

/* ---- 分页 ---- */
function renderTabs(){
  document.getElementById('pgTabs').innerHTML = cur.pages.map((p,i)=>`<div class="pg-tab ${i===curPage?'active':''}" onclick="gotoPage(${i})">第${i+1}页${i>0&&!readonly?`<span class="x" onclick="event.stopPropagation();delPage(${i})">×</span>`:''}</div>`).join('')
    + (readonly?'':`<button class="pg-add" ${cur.pages.length>=10?'disabled':''} onclick="addPage()">＋</button>`);
}
function gotoPage(i){ curPage=i; selId=null; curCardId=cur.pages[i].cards[0].id; renderAll(); }
function addPage(){ if(cur.pages.length>=10||readonly) return; const p=S.newPage(); cur.pages.push(p); curPage=cur.pages.length-1; curCardId=p.cards[0].id; selId=null; renderAll(); }
async function delPage(i){ if(readonly) return; const p=cur.pages[i];
  const hasQ=p.cards.some(c=>c.questions.length);
  if(hasQ && !(await confirmBox('当前页已添加了题目，确认删除？'))) return;
  cur.pages.splice(i,1); if(curPage>=cur.pages.length) curPage=cur.pages.length-1; curCardId=cur.pages[curPage].cards[0].id; selId=null; renderAll(); }

/* ---- 卡片 ---- */
function addCard(){ if(readonly) return; const c=S.newCard(''); cur.pages[curPage].cards.push(c); curCardId=c.id; selId=null; renderCards(); renderProps(); }
async function delCard(id){ if(readonly) return; const pg=cur.pages[curPage];
  if(pg.cards.length<=1){ await confirmBox('每页至少保留 1 个卡片'); return; }
  const c=pg.cards.find(x=>x.id===id);
  if(c.questions.length && !(await confirmBox('当前卡片已添加题目，确认删除？'))) return;
  pg.cards=pg.cards.filter(x=>x.id!==id); if(curCardId===id)curCardId=pg.cards[0].id; selId=null; renderCards(); renderProps(); }
function setCardTitle(id,v){ findCard(id).title=v; }
function selectCard(id){ if(curCardId===id) return; curCardId=id; selId=null; renderCards(); renderProps(); }
function findCard(id){ for(const p of cur.pages){ const c=p.cards.find(x=>x.id===id); if(c) return c; } return null; }

/* ---- 画布 ---- */
function renderCards(){
  const pg=cur.pages[curPage]; let n=0;
  for(let i=0;i<curPage;i++) cur.pages[i].cards.forEach(c=>c.questions.forEach(()=>{ n++; }));
  const el=document.getElementById('canvas');
  el.innerHTML = pg.cards.map(cd=>{
    const qs=cd.questions.map(q=>{ n++; return questionHTML(q,n); }).join('') || `<div class="pp-empty" style="padding:16px">本卡片暂无题目，点下方题型或从左侧拖入</div>`;
    const del = readonly?'' : `<span class="cardblk-del" onclick="event.stopPropagation();delCard('${cd.id}')">🗑 删除卡片</span>`;
    const foot = readonly?'' : cardAddTrigger(cd.id);
    return `<div class="cardblk ${cd.id===curCardId?'cur':''}" data-card="${cd.id}" onclick="selectCard('${cd.id}')" ondragover="cardDragOver(event)" ondrop="cardDrop(event,'${cd.id}')">
      <div class="cardblk-h"><input class="cardblk-t" ${readonly?'disabled':''} onclick="event.stopPropagation()" placeholder="卡片标题（选填，填写者可见）" value="${E.esc(cd.title)}" oninput="setCardTitle('${cd.id}',this.value)">${del}</div>
      ${qs}${foot}</div>`;
  }).join('') + (readonly?'' : `<button class="card-add" onclick="addCard()">＋ 添加卡片</button>`);
}
/* 卡片底部“添加题目”——按钮，点击后弹出题型卡片（分组） */
function cardAddTrigger(cardId){
  const open = openAddCard===cardId;
  let pop='';
  if(open){
    const grps=S.GROUPS.map(g=>{
      const chips=Object.keys(S.TYPES).filter(k=>S.TYPES[k].group===g)
        .map(k=>`<span class="cardadd-t" onclick="event.stopPropagation();addTypeTo('${cardId}','${k}')">${S.TYPES[k].name}</span>`).join('');
      return `<div class="addpop-grp"><div class="addpop-t">${g}</div><div class="addpop-chips">${chips}</div></div>`;
    }).join('');
    pop=`<div class="addpop" onclick="event.stopPropagation()">${grps}</div>`;
  }
  return `<div class="cardadd">${pop}<button class="card-addbtn ${open?'on':''}" onclick="event.stopPropagation();toggleAddPanel('${cardId}')">＋ 添加题目</button></div>`;
}
function toggleAddPanel(cardId){ openAddCard = (openAddCard===cardId? null : cardId); renderCards(); }
function addTypeTo(cardId,type){ if(readonly||!type) return; openAddCard=null; curCardId=cardId; const q=S.newQuestion(type); findCard(cardId).questions.push(q); selId=q.id; renderAll(); }

function questionHTML(q,n){
  const t=S.TYPES[q.type];
  const req=q.required?`<span class="q-req">*</span>`:'';
  const titleRow=`<div class="cq-titrow">${req}<span class="q-no">${n}.</span><input class="cq-title" ${readonly?'disabled':''} maxlength="30" placeholder="请输入题目标题" value="${E.esc(q.title)}" onclick="event.stopPropagation()" oninput="setQTitle('${q.id}',this.value)"></div>`;
  const hint=q.hint?`<div class="q-hint">${E.esc(q.hint)}</div>`:'';
  const inner = t.choice ? `${titleRow}${hint}${optionsHTML(q)}` : `${titleRow}${hint}<div class="q-b">${staticBody(q)}</div>`;
  const defTog = ((q.type==='radio'||q.type==='radioScore') && !readonly) ? `<label class="qc-tog" onclick="event.stopPropagation()"><span class="sw ${q.defaultEnabled?'on':''}" onclick="toggleDefaultEnabled('${q.id}')"></span> 设置默认选项</label>` : '';
  const linkTog = (t.choice && !readonly) ? `<label class="qc-tog" onclick="event.stopPropagation()"><span class="sw ${q.linkEnabled?'on':''}" onclick="toggleLink('${q.id}')"></span> 选项关联字段</label>` : '';
  const ops = readonly?'' : `<div class="qc-ops">
    <label><input type="checkbox" ${q.required?'checked':''} onchange="setReq('${q.id}',this.checked)"> 必填</label>
    <span class="op" onclick="event.stopPropagation();dupQ('${q.id}')">⧉ 复制</span>
    <span class="op del" onclick="event.stopPropagation();delQ('${q.id}')">🗑 删除</span>${defTog}${linkTog}</div>`;
  const drag = readonly?'':`<span class="qc-drag" title="拖拽排序">⠿</span>`;
  /* 只读时整题被禁用控件覆盖，点击不会冒泡——用透明遮罩让整题可选中 */
  const roMask = readonly? `<div class="qc-ro-mask" onclick="event.stopPropagation();selectQ('${q.id}')"></div>` : '';
  return `<div class="qc ${readonly?'ro':''} ${q.id===selId?'sel':''}" data-id="${q.id}" ${readonly?'':'draggable="true"'} onclick="event.stopPropagation();selectQ('${q.id}')"
      ondragstart="qDragStart(event,'${q.id}')" ondragover="qDragOver(event,'${q.id}')" ondrop="qDrop(event,'${q.id}')" ondragleave="qDragLeave(event,'${q.id}')">
    ${roMask}${drag}<span class="qc-type">${t.name}</span>${inner}${ops}</div>`;
}
/* 非选择题：中间画布静态占位 */
function staticBody(q){
  switch(q.type){
    case 'text': return `<input class="q-input" disabled placeholder="${E.esc(q.placeholder)||'请输入'}">`;
    case 'textarea': return `<textarea class="q-input" rows="${q.rows||3}" disabled placeholder="${E.esc(q.placeholder)||'请输入'}"></textarea>`;
    case 'number': return `<div class="q-num"><input class="q-input" type="number" disabled placeholder="${E.esc(q.placeholder)||'请输入数字'}">${q.unit?`<span class="q-unit">${E.esc(q.unit)}</span>`:''}</div>`;
    case 'date': return `<input class="q-input" type="${q.precision==='datetime'?'datetime-local':'date'}" disabled>`;
    case 'image': return `<div class="q-img">＋</div>`;
    case 'tags': return `<div class="q-tags"><input class="q-input q-taginput" disabled placeholder="输入后回车添加"></div>`;
    case 'subtable': return subPreview(q);
    case 'richtext': return `<div class="q-richph">${E.esc(q.placeholder)||'（富文本输入区，填写者可加粗、改色等）'}</div>`;
    default: return '';
  }
}
function subPreview(q){
  const cols=q.columns||[];
  if(!cols.length) return `<div class="q-sub">列表：请在右侧属性面板配置列</div>`;
  return `<div class="subt-wrap"><table class="subt"><thead><tr>${cols.map(c=>`<th>${E.esc(c.name)||'列'}</th>`).join('')}</tr></thead>`+
    `<tbody><tr>${cols.map(()=>`<td style="color:#c2ccd9">…</td>`).join('')}</tr></tbody></table></div><div class="hint">应用端填报时可增删行；单选/多选列以下拉选择。</div>`;
}
function optionsHTML(q){
  const t=S.TYPES[q.type]; const isRadio=(q.type==='radio'||q.type==='radioScore'); const mark=isRadio?'radio':'check';
  const showDef = isRadio && q.defaultEnabled;
  const cols = Number(q.optionCols)===2 ? ' cols2' : '';
  let h=`<div class="cq-opts${cols}">`;
  q.options.forEach((o,i)=>{
    const on = showDef && Number(q.defaultIndex)===i;
    const def = showDef? `<span class="cq-default ${on?'on':''}" title="设为默认选中" onclick="event.stopPropagation();setDefault('${q.id}',${i})">${on?'● 默认':'○ 默认'}</span>` : '';
    const score = t.score?`<input class="oscore" placeholder="分" value="${E.esc(o.score)}" onclick="event.stopPropagation()" oninput="setOptScore('${q.id}',${i},this.value)">分`:'';
    if(q.linkEnabled && o.linkType){
      h+=`<div class="cq-opt"><span class="mark ${mark}${on?' on':''}"></span><span class="olinked">${E.esc(o.linkName)} <span class="orm" onclick="event.stopPropagation();unlink('${q.id}',${i})">×</span></span>${score}${def}<span class="orm" onclick="event.stopPropagation();rmOpt('${q.id}',${i})">×</span></div>`;
    } else {
      const linkBtn = q.linkEnabled? `<span class="olink" onclick="event.stopPropagation();openLink('${q.id}',${i})">↔关联</span>` : '';
      h+=`<div class="cq-opt"><span class="mark ${mark}${on?' on':''}"></span><input class="otext" maxlength="20" placeholder="请输入选项" value="${E.esc(o.text)}" onclick="event.stopPropagation()" oninput="setOptText('${q.id}',${i},this.value)">${linkBtn}${score}${def}<span class="orm" onclick="event.stopPropagation();rmOpt('${q.id}',${i})">×</span></div>`;
    }
  });
  h+=`</div><span class="cq-addopt" onclick="event.stopPropagation();addOpt('${q.id}')">＋ 添加选项</span>`;
  return h;
}
function richHTML(q){
  return `<div class="cq-rich-tb" onclick="event.stopPropagation()">
      <button onmousedown="rt(event,'bold')"><b>B</b></button>
      <button onmousedown="rt(event,'italic')"><i>I</i></button>
      <button onmousedown="rt(event,'foreColor','#2b7de9')" style="color:#2b7de9">蓝</button>
      <button onmousedown="rt(event,'foreColor','#e45c5c')" style="color:#e45c5c">红</button>
      <button onmousedown="rt(event,'insertUnorderedList')">• 列表</button>
    </div>
    <div class="cq-rich-ed" ${readonly?'':'contenteditable="true"'} onclick="event.stopPropagation()" oninput="setRich('${q.id}',this.innerHTML)">${q.content||''}</div>`;
}
function rt(e,cmd,val){ e.preventDefault(); document.execCommand(cmd,false,val||null); }

/* ---- 题目操作 ---- */
function selectQ(id){ curCardId=findCardOfQ(id).id; if(selId===id) return; selId=id; renderCards(); renderProps(); }
function setReq(id,v){ findQ(id).required=v; renderCards(); }
function setQTitle(id,v){ findQ(id).title=v; }            /* 不整体重绘，避免失焦 */
function setCols(id,n){ if(readonly)return; findQ(id).optionCols=n; renderCards(); renderProps(); }
function toggleLink(id){ if(readonly)return; const q=findQ(id); q.linkEnabled=!q.linkEnabled; renderCards(); }
function setDefault(id,i){ if(readonly)return; const q=findQ(id); q.defaultIndex=(Number(q.defaultIndex)===i? null : i); renderCards(); }
function toggleDefaultEnabled(id){ if(readonly)return; const q=findQ(id); q.defaultEnabled=!q.defaultEnabled; if(!q.defaultEnabled) q.defaultIndex=null; renderCards(); }
function dupQ(id){ const c=findCardOfQ(id); const i=c.questions.findIndex(q=>q.id===id); const cp=JSON.parse(JSON.stringify(c.questions[i])); cp.id=S.uid('q'); c.questions.splice(i+1,0,cp); selId=cp.id; renderCards(); renderProps(); }
async function delQ(id){ if(await confirmBox('确认删除该题目？')){ const c=findCardOfQ(id); c.questions=c.questions.filter(q=>q.id!==id); if(selId===id)selId=null; renderCards(); renderProps(); } }
function findQ(id){ for(const p of cur.pages)for(const c of p.cards){ const q=c.questions.find(x=>x.id===id); if(q) return q; } return null; }
function findCardOfQ(id){ for(const p of cur.pages)for(const c of p.cards){ if(c.questions.some(x=>x.id===id)) return c; } return null; }

/* ---- 选项编辑（不整体重绘，避免失焦） ---- */
function setOptText(id,i,v){ findQ(id).options[i].text=v; }
function setOptScore(id,i,v){ findQ(id).options[i].score=v; }
function setRich(id,html){ findQ(id).content=html; }
function addOpt(id){ findQ(id).options.push(S.newOption()); renderCards(); }
function rmOpt(id,i){ const q=findQ(id); q.options.splice(i,1); if(Number(q.defaultIndex)===i)q.defaultIndex=null; else if(Number(q.defaultIndex)>i)q.defaultIndex--; renderCards(); }
function unlink(id,i){ const o=findQ(id).options[i]; o.linkType=null; o.linkName=''; o.linkId=null; renderCards(); }

/* ---- 拖拽排序（跨卡片/同页） ---- */
let dragId=null;
function qDragStart(e,id){ dragId=id; e.dataTransfer.effectAllowed='move'; }
function qDragOver(e,id){ if(!dragId&&!palType) return; e.preventDefault(); const el=e.currentTarget; const r=el.getBoundingClientRect(); const after=(e.clientY-r.top)>r.height/2; el.classList.toggle('drop-after',after); el.classList.toggle('drop-before',!after); }
function qDragLeave(e){ e.currentTarget.classList.remove('drop-after','drop-before'); }
function qDrop(e,id){ e.preventDefault(); e.stopPropagation(); const el=e.currentTarget; const r=el.getBoundingClientRect(); const after=(e.clientY-r.top)>r.height/2; el.classList.remove('drop-after','drop-before');
  const tc=findCardOfQ(id); let ti=tc.questions.findIndex(q=>q.id===id); if(after)ti++;
  if(palType){ const q=S.newQuestion(palType); tc.questions.splice(ti,0,q); selId=q.id; curCardId=tc.id; palType=null; renderAll(); return; }
  if(!dragId) return; const fc=findCardOfQ(dragId); const fi=fc.questions.findIndex(q=>q.id===dragId); const [m]=fc.questions.splice(fi,1); if(fc===tc&&fi<ti)ti--; tc.questions.splice(ti,0,m); dragId=null; renderCards(); }
function cardDragOver(e){ if(palType||dragId){ e.preventDefault(); } }
function cardDrop(e,cardId){ if(e.defaultPrevented) return; const c=findCard(cardId);
  if(palType){ const q=S.newQuestion(palType); c.questions.push(q); selId=q.id; curCardId=c.id; palType=null; renderAll(); }
  else if(dragId){ const fc=findCardOfQ(dragId); const fi=fc.questions.findIndex(q=>q.id===dragId); const [m]=fc.questions.splice(fi,1); c.questions.push(m); dragId=null; renderCards(); } }

/* ---- 标题/主题 ---- */
function onTitle(v){ cur.title=v; }
function onTheme(v){ cur.pages[curPage].theme=v; }

/* ---- 右栏属性（题目标题在画布编辑；只读时禁用但仍展示） ---- */
function renderProps(){
  const el=document.getElementById('props'); const q=selId&&findQ(selId);
  el.classList.toggle('ro', readonly);
  if(!q){ el.innerHTML=`<div class="pp-empty">选中题目后<br>在此编辑属性<br><span style="font-size:12px">（题目标题、选项在中间画布编辑）</span></div>`; return; }
  const t=S.TYPES[q.type]; const dis=readonly?'disabled':'';
  const roNote = readonly? `<div class="pp-ro-note">🔒 表单已发布，属性仅供查看，禁止编辑</div>` : '';
  let h=roNote+`<div class="pp-sec"><div class="pp-sec-t">基础 · ${t.name}</div>`;
  h+=`<div class="pp-row"><label>题目说明（选填）</label><input class="ctrl" ${dis} value="${E.esc(q.hint||'')}" oninput="updV('${q.id}','hint',this.value)"></div></div>`;
  // 选择题：选项排列（单列/双列）
  if(t.choice){
    h+=`<div class="pp-sec"><div class="pp-sec-t">选项排列</div><div class="cq-cols">`+
       `<button class="${Number(q.optionCols)!==2?'on':''}" ${dis} onclick="setCols('${q.id}',1)">单列</button>`+
       `<button class="${Number(q.optionCols)===2?'on':''}" ${dis} onclick="setCols('${q.id}',2)">双列</button></div></div>`;
  }
  // 列表：列配置
  if(q.type==='subtable'){ h+=subColConfig(q); }
  // 类型属性
  const fields=PROPS[q.type]||[];
  if(fields.length){
    h+=`<div class="pp-sec"><div class="pp-sec-t">属性</div>`;
    fields.forEach(f=>{ h+=propField(q,f); });
    h+=`</div>`;
  }
  // 查询条件
  const modes=S.queryModesFor(q);
  if(modes){
    h+=`<div class="pp-sec"><div class="pp-sec-t">查询条件</div>
      <div class="pp-switch"><span>设为查询条件</span><span class="sw ${q.query&&q.query.on?'on':''}" onclick="toggleQuery('${q.id}')"></span></div>`;
    if(q.query&&q.query.on){
      h+=`<div class="pp-row"><label>查询形式</label><select class="ctrl" ${dis} onchange="updQuery('${q.id}',this.value)">`+
         modes.map(m=>`<option value="${m[0]}" ${q.query.mode===m[0]?'selected':''}>${m[1]}</option>`).join('')+`</select></div>`;
    }
    h+=`</div>`;
  }
  // 数据列表显示（仅部分题型支持）
  if(S.canShowInList(q)){
    h+=`<div class="pp-sec"><div class="pp-sec-t">数据列表</div>
      <div class="pp-switch"><span>在列表中显示</span><span class="sw ${q.showInList?'on':''}" onclick="updV('${q.id}','showInList',!findQ('${q.id}').showInList);renderProps()"></span></div></div>`;
  }
  el.innerHTML=h;
}
function subColConfig(q){
  const dis=readonly?'disabled':'';
  let h=`<div class="pp-sec"><div class="pp-sec-t">列配置</div>`;
  (q.columns||[]).forEach((c,ci)=>{
    const isOpt=(c.type==='radio'||c.type==='checkbox');
    let optsHtml='';
    if(isOpt){
      optsHtml=`<div class="colcfg-opts">`+(c.options||[]).map((o,oi)=>`<input value="${E.esc(o)}" ${dis} oninput="setColOpt('${q.id}',${ci},${oi},this.value)">`).join('')+
        (readonly?'':`<span class="addo" onclick="addColOpt('${q.id}',${ci})">＋项</span>`)+`</div>`;
    }
    h+=`<div class="colcfg"><div class="colcfg-r">
        <input class="nm" placeholder="列名" ${dis} value="${E.esc(c.name)}" oninput="setColName('${q.id}',${ci},this.value)">
        <select ${dis} onchange="setColType('${q.id}',${ci},this.value)">${S.SUBCOL_TYPES.map(s=>`<option value="${s[0]}" ${c.type===s[0]?'selected':''}>${s[1]}</option>`).join('')}</select>
        ${readonly?'':`<span class="rm" onclick="rmCol('${q.id}',${ci})">×</span>`}
      </div>${optsHtml}</div>`;
  });
  if(!readonly) h+=`<span class="pp-add-opt" onclick="addCol('${q.id}')">＋ 添加列</span>`;
  h+=`</div>`;
  return h;
}
function propField(q,f){
  const [k,label,type,opts]=f; const v=q[k]; const dis=readonly?'disabled':'';
  if(type==='switch') return `<div class="pp-switch"><span>${label}</span><span class="sw ${v?'on':''}" onclick="updV('${q.id}','${k}',!findQ('${q.id}').${k});renderProps()"></span></div>`;
  if(type==='select') return `<div class="pp-row"><label>${label}</label><select class="ctrl" ${dis} onchange="updV('${q.id}','${k}',this.value)">`+opts.map(o=>`<option value="${o[0]}" ${v===o[0]?'selected':''}>${o[1]}</option>`).join('')+`</select></div>`;
  return `<div class="pp-row"><label>${label}</label><input class="ctrl" ${dis} type="${type==='number'?'number':'text'}" value="${v==null?'':E.esc(v)}" oninput="updV('${q.id}','${k}',this.value)"></div>`;
}
function updV(id,k,v){ if(readonly && k!=='showInList') return; findQ(id)[k]=v; if(k==='title'||k==='hint'||k==='unit'||k==='placeholder'||k==='precision'||k==='rows')renderCards(); }
function toggleQuery(id){ if(readonly)return; const q=findQ(id); q.query.on=!q.query.on; if(q.query.on&&!q.query.mode){ q.query.mode=S.queryModesFor(q)[0][0]; } renderProps(); }
function updQuery(id,v){ if(readonly)return; findQ(id).query.mode=v; }

/* ---- 列表列配置操作 ---- */
function addCol(id){ if(readonly)return; findQ(id).columns.push(S.newSubCol('text')); renderProps(); renderCards(); }
function rmCol(id,ci){ if(readonly)return; const q=findQ(id); if(q.columns.length<=1){ confirmBox('至少保留 1 列'); return; } q.columns.splice(ci,1); renderProps(); renderCards(); }
function setColName(id,ci,v){ findQ(id).columns[ci].name=v; renderCards(); }
function setColType(id,ci,v){ const c=findQ(id).columns[ci]; c.type=v; if((v==='radio'||v==='checkbox')&&!(c.options&&c.options.length)) c.options=['选项1','选项2']; renderProps(); renderCards(); }
function addColOpt(id,ci){ if(readonly)return; findQ(id).columns[ci].options.push('选项'+(findQ(id).columns[ci].options.length+1)); renderProps(); }
function setColOpt(id,ci,oi,v){ findQ(id).columns[ci].options[oi]=v; }

/* ---- 关联弹窗 ---- */
function openLink(id,i){ if(readonly)return; linkCtx={id,i}; document.getElementById('lkSym').value=''; document.getElementById('lkDis').value=''; document.getElementById('lkShow').value=''; document.getElementById('lkErr').textContent=''; document.getElementById('linkMask').style.display='flex'; }
function closeLink(){ document.getElementById('linkMask').style.display='none'; linkCtx=null; }
function confirmLink(){ const sym=document.getElementById('lkSym').value.trim(), dis=document.getElementById('lkDis').value.trim(), show=document.getElementById('lkShow').value.trim();
  if(sym&&dis){ document.getElementById('lkErr').textContent='症状或疾病，仅可以选择 1 个'; return; }
  if(!sym&&!dis){ document.getElementById('lkErr').textContent='未选择症状或疾病，无法关联'; return; }
  const o=findQ(linkCtx.id).options[linkCtx.i]; o.linkType=sym?'symptom':'disease'; o.linkId=(sym?'sym_':'dis_')+Math.random().toString(36).slice(2,6); o.linkName= show || sym || dis; o.text='';
  closeLink(); renderCards(); }

/* ---- 校验 & 保存 ---- */
function validate(){
  if(!cur.title) return '标题未填写，请检查';
  for(const p of cur.pages){
    const anyQ=p.cards.some(c=>c.questions.length);
    if(!p.theme && !anyQ) return '存在空的分页，请检查';
    for(const c of p.cards)for(const q of c.questions){
      if(!q.title) return '存在题目标题未填写，请检查';
      if(S.TYPES[q.type].choice){
        if(!q.options.length) return '存在题目没有选项，请检查';
        for(const o of q.options){ if(!o.text && !o.linkType) return '存在选项未填写或关联内容，请检查'; }
      }
    }
  }
  return null;
}
async function saveForm(){ if(readonly) return; const err=validate();
  if(err){ await confirmBox(err); return; }
  cur.updatedBy='张三'; S.saveForm(cur); const s=document.getElementById('savedAt'); if(s)s.textContent='最近保存 '+fmt(Date.now())+'（张三）'; toast('保存成功'); }
function preview(){ localStorage.setItem('mjf_preview', JSON.stringify(cur)); window.open('../preview.html','_blank'); }

/* ---- 统一重绘 ---- */
function renderAll(){ document.getElementById('cvTitle').value=cur.title||''; document.getElementById('cvTheme').value=cur.pages[curPage].theme||''; renderTabs(); renderCards(); renderProps(); }

/* 点击空白处关闭“添加题目”弹出卡片 */
document.addEventListener('click', ()=>{ if(openAddCard){ openAddCard=null; renderCards(); } });

renderCats();
renderList();
</script>
</body>
</html>
