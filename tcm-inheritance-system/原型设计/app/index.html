<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>应用端 · 数据列表</title>
<link rel="stylesheet" href="../shared/theme.css">
<style>
  .main{padding:18px 22px}
  .toolbar{display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap}
  .toolbar .grow{flex:1}
  .rec-q{padding:10px 0;border-bottom:1px solid #f0f3f8}
  .rec-l{color:#6a7688;font-size:13px;margin-bottom:5px}
  .filter-body .qf{margin-bottom:16px}
  .filter-body .qf>label{display:block;font-size:13px;color:#41506a;margin-bottom:6px;font-weight:500}
  .filter-body .range{display:flex;gap:8px;align-items:center}
  .filter-body .chk{display:flex;flex-wrap:wrap;gap:8px 14px}
  .filter-body .chk label{display:inline-flex;align-items:center;gap:5px;font-size:13px;color:#41506a}
  .fdrawer{width:400px}
</style>
</head>
<body>
<div class="mj-top">
  <div class="mj-logo"><span class="dot"></span>脉景 <span class="accent">应用端</span></div>
  <div class="mj-menu"><a href="../admin/index.html">表单设置</a><a class="active">数据列表</a></div>
  <div class="mj-user"><span class="av"></span><span>录入员</span></div>
</div>

<!-- 顶部二级导航：类目（一级标签页）→ 表单（二级胶囊） -->
<div class="subnav">
  <div class="subnav-cats" id="navCats"></div>
  <div class="subnav-forms"><span class="lb">表单</span><span id="navForms"></span></div>
</div>

<div class="main">
  <div class="toolbar">
    <h2 id="tplTitle" style="margin:0;font-size:18px"></h2>
    <div class="grow"></div>
    <button class="btn" id="btnFilter" onclick="openFilter()">🔍 查询条件</button>
    <button class="btn primary" id="btnAdd" onclick="openFill('add')">＋ 新增数据</button>
  </div>
  <div class="panel">
    <table class="tbl">
      <thead id="thead"></thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>
</div>

<!-- 查询条件：右侧抽屉 -->
<div id="filterMask" class="mask" style="display:none;justify-content:flex-end">
  <div class="drawer fdrawer">
    <div class="d-h">查询条件 <span class="x" onclick="closeFilter()">×</span></div>
    <div class="d-b filter-body" id="filterBody"></div>
    <div class="d-f"><button class="btn" onclick="clearFilter()">清空</button><button class="btn primary" onclick="applyFilter()">查询</button></div>
  </div>
</div>

<!-- 查看 / 编辑 / 采集：预览式（web/手机切换） -->
<div id="fillMask" class="mask" style="display:none">
  <div class="modal" style="width:900px;max-width:96vw;height:90vh">
    <div class="m-h"><span id="fillTitle">查看数据</span>
      <span style="display:flex;align-items:center;gap:14px">
        <span class="pv-seg" style="transform:scale(.92)">
          <button id="segPhone" onclick="setDev('mobile')">📱 手机</button>
          <button id="segPc" class="active" onclick="setDev('pc')">💻 电脑</button>
        </span>
        <span class="x" onclick="closeFill()">×</span>
      </span>
    </div>
    <div class="m-b" style="background:#eef2f7;flex:1;display:flex;justify-content:center;align-items:flex-start">
      <div id="fillPaper" class="pv-paper" style="margin:18px 0"></div>
    </div>
    <div class="m-f" id="fillFoot"></div>
  </div>
</div>

<script src="../shared/store.js"></script>
<script src="../shared/engine.js"></script>
<script>
const S=MJ.Store, E=MJ.Engine;
let curCat=null, curId=null, filters={}, pending={}, fillMode='view', fillSubId=null;

function eachQ(form,fn){ (form.pages||[]).forEach(p=>(p.cards||[]).forEach(c=>(c.questions||[]).forEach(fn))); }
/* 仅展示已发布 或 已下架但“显示数据”的表单；草稿及隐藏数据的不出现 */
function visibleForms(catId){ return S.formsByCategory(catId).filter(f=> f.status==='published' || (f.status==='unpublished' && !f.hidden) ); }

function renderNav(){
  /* 仅展示“有已发布/显示中表单”的类目，空类目整体隐藏 */
  const cats=S.getCategories().filter(c=>visibleForms(c.id).length);
  if((!curCat || !cats.some(c=>c.id===curCat)) && cats.length) curCat=cats[0].id;
  if(!cats.length){ document.getElementById('navCats').innerHTML='<span class="hint" style="padding:11px 16px">暂无已发布表单</span>'; document.getElementById('navForms').innerHTML=''; curCat=null; curId=null; return; }
  document.getElementById('navCats').innerHTML = cats.map(c=>`<span class="cat-tab ${c.id===curCat?'active':''}" onclick="selectCat('${c.id}')">${E.esc(c.name)}</span>`).join('');
  const forms=visibleForms(curCat);
  if(!curId || !forms.some(f=>f.id===curId)) curId = forms.length? forms[0].id : null;
  document.getElementById('navForms').innerHTML = forms.length
    ? forms.map(f=>`<span class="form-pill ${f.id===curId?'active':''}" onclick="selectForm('${f.id}')">${E.esc(f.title)||'（未命名）'}</span>`).join('')
    : '<span class="hint">该类目暂无已发布表单</span>';
}
function selectCat(id){ curCat=id; curId=null; filters={}; renderNav(); renderMain(); }
function selectForm(id){ curId=id; filters={}; renderNav(); renderMain(); }

function allQueryQuestions(form){ const out=[]; eachQ(form,q=>{ if(q.query&&q.query.on) out.push(q); }); return out; }
function listColumns(form){ const out=[]; eachQ(form,q=>{ if(q.showInList && S.canShowInList(q)) out.push(q); }); return out; }

function renderMain(){
  const cur = curId && S.getForm(curId);
  const add=document.getElementById('btnAdd'), flt=document.getElementById('btnFilter');
  if(!cur){ document.getElementById('tplTitle').textContent='请选择上方表单'; document.getElementById('thead').innerHTML=''; document.getElementById('tbody').innerHTML=''; add.disabled=true; flt.disabled=true; return; }
  add.disabled=false; flt.disabled=false;
  document.getElementById('tplTitle').textContent = (cur.title||'（未命名）')+' · 数据';
  renderTable(cur);
}

/* ---------- 列表 ---------- */
function cellText(q,v){
  if(v==null||v==='') return '';
  if(q.type==='subtable') return (Array.isArray(v)?v.length:0)+' 行';
  if(Array.isArray(v)) return v.join('、');
  return String(v);
}
function renderTable(cur){
  const cols=listColumns(cur);
  document.getElementById('thead').innerHTML=`<tr>${cols.map(c=>`<th>${E.esc(c.title)}</th>`).join('')}<th style="width:140px">填写时间</th><th style="width:160px">操作</th></tr>`;
  const rows=S.getSubmissions(cur.id).filter(s=>matchRow(cur,s.values)).sort((a,b)=>b.createdAt-a.createdAt);
  const fmt=ts=>{const d=new Date(ts);const p=n=>('0'+n).slice(-2);return `${d.getMonth()+1}-${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}`;};
  document.getElementById('tbody').innerHTML = rows.map(s=>`<tr>${cols.map(c=>`<td>${E.esc(cellText(c,s.values[c.id]))}</td>`).join('')}<td>${fmt(s.createdAt)}</td>
    <td><span class="link" onclick="openFill('view','${s.id}')">查看</span><span class="link" onclick="openFill('edit','${s.id}')">编辑</span><span class="link danger" onclick="delSub('${s.id}')">删除</span></td></tr>`).join('')
    || `<tr><td colspan="${cols.length+2}" style="text-align:center;color:#8a97a8;padding:30px">暂无数据，点右上角「新增数据」录入</td></tr>`;
}
async function delSub(id){ if(await confirmA('确认删除该条数据？')){ S.deleteSubmission(id); renderTable(S.getForm(curId)); } }

/* ---------- 查询抽屉 ---------- */
function openFilter(){ const cur=S.getForm(curId); if(!cur) return; pending=JSON.parse(JSON.stringify(filters)); renderFilterBody(cur); document.getElementById('filterMask').style.display='flex'; }
function closeFilter(){ document.getElementById('filterMask').style.display='none'; }
function renderFilterBody(cur){
  const qs=allQueryQuestions(cur);
  const el=document.getElementById('filterBody');
  if(!qs.length){ el.innerHTML='<div class="hint" style="padding:8px">该表单未配置查询条件</div>'; return; }
  el.innerHTML = qs.map(q=>{
    const m=q.query.mode; let ctrl='';
    if(m==='fuzzy') ctrl=`<input class="ctrl" placeholder="模糊查询" value="${E.esc(pending[q.id]||'')}" oninput="pending['${q.id}']=this.value">`;
    else if(m==='exact') ctrl=`<input class="ctrl" placeholder="精准查询" value="${E.esc(pending[q.id]||'')}" oninput="pending['${q.id}']=this.value">`;
    else if(m==='range'&&q.type==='number') ctrl=`<div class="range"><input class="ctrl" type="number" placeholder="最小" value="${E.esc(pending[q.id+'_min']||'')}" oninput="pending['${q.id}_min']=this.value"><span>~</span><input class="ctrl" type="number" placeholder="最大" value="${E.esc(pending[q.id+'_max']||'')}" oninput="pending['${q.id}_max']=this.value"></div>`;
    else if(m==='range'&&q.type==='date') ctrl=`<div class="range"><input class="ctrl" type="date" value="${E.esc(pending[q.id+'_from']||'')}" oninput="pending['${q.id}_from']=this.value"><span>~</span><input class="ctrl" type="date" value="${E.esc(pending[q.id+'_to']||'')}" oninput="pending['${q.id}_to']=this.value"></div>`;
    else if(m==='select') ctrl=`<select class="ctrl" onchange="pending['${q.id}']=this.value"><option value="">全部</option>${(q.options||[]).map(o=>{const l=o.linkName||o.text;return `<option ${pending[q.id]===l?'selected':''}>${E.esc(l)}</option>`;}).join('')}</select>`;
    else if(m==='multi'){ const sel=pending[q.id]||[]; const disp=sel.length?sel.join('、'):'全部'; ctrl=`<div class="ms" data-qid="${q.id}"><div class="ms-disp ${sel.length?'':'placeholder'}" onclick="event.stopPropagation();this.parentNode.classList.toggle('open')">${E.esc(disp)}</div><div class="ms-panel">${(q.options||[]).map(o=>{const l=o.linkName||o.text;return `<label class="ms-opt"><input type="checkbox" value="${E.esc(l)}" ${sel.includes(l)?'checked':''} onchange="fmsChange('${q.id}')"> ${E.esc(l)}</label>`;}).join('')}</div></div>`; }
    else ctrl=`<input class="ctrl" oninput="pending['${q.id}']=this.value">`;
    return `<div class="qf"><label>${E.esc(q.title)}</label>${ctrl}</div>`;
  }).join('');
}
function fmsChange(qid){ const box=document.querySelector('.ms[data-qid="'+qid+'"]'); if(!box)return; const sel=[...box.querySelectorAll('input:checked')].map(i=>i.value); pending[qid]=sel; const d=box.querySelector('.ms-disp'); d.textContent=sel.length?sel.join('、'):'全部'; d.classList.toggle('placeholder',!sel.length); }
document.addEventListener('click',e=>{ if(!e.target.closest('.ms')) document.querySelectorAll('.ms.open').forEach(x=>x.classList.remove('open')); });
function applyFilter(){ filters=JSON.parse(JSON.stringify(pending)); closeFilter(); renderTable(S.getForm(curId)); }
function clearFilter(){ pending={}; filters={}; renderFilterBody(S.getForm(curId)); renderTable(S.getForm(curId)); }

function matchRow(cur,v){
  const qs=allQueryQuestions(cur);
  for(const q of qs){ let val=v[q.id]; const m=q.query.mode;
    const str = Array.isArray(val)? val.join('、') : (q.type==='subtable'? JSON.stringify(val||[]) : String(val==null?'':val));
    if(m==='fuzzy'){ const f=filters[q.id]; if(f && !str.includes(f)) return false; }
    else if(m==='exact'){ const f=filters[q.id]; if(f && str!==f) return false; }
    else if(m==='range'&&q.type==='number'){ const mn=filters[q.id+'_min'],mx=filters[q.id+'_max']; if(mn!==undefined&&mn!==''&&Number(val)<Number(mn))return false; if(mx!==undefined&&mx!==''&&Number(val)>Number(mx))return false; }
    else if(m==='range'&&q.type==='date'){ const fr=filters[q.id+'_from'],to=filters[q.id+'_to']; if(fr&&String(val||'')<fr)return false; if(to&&String(val||'')>to)return false; }
    else if(m==='select'){ const f=filters[q.id]; if(f){ const arr=Array.isArray(val)?val:[val]; if(!arr.includes(f))return false; } }
    else if(m==='multi'){ const f=filters[q.id]; if(f&&f.length){ const arr=Array.isArray(val)?val:[val]; if(!f.some(x=>arr.includes(x)))return false; } }
  }
  return true;
}

/* ---------- 查看 / 编辑 / 采集 ---------- */
function openFill(mode, subId){
  const cur=S.getForm(curId); if(!cur) return;
  fillMode=mode; fillSubId=subId||null;
  const sub = subId? S.getSubmissions(cur.id).find(x=>x.id===subId) : null;
  const values = sub? sub.values : {};
  const ro = mode==='view';
  document.getElementById('fillTitle').textContent = mode==='view'?'查看数据':(mode==='edit'?'编辑数据':'新增数据');
  const paper=document.getElementById('fillPaper');
  paper.innerHTML = E.renderFill(cur, values, {readonly:ro});
  E.activate(paper);   /* 只读也需绑定：多页时可翻页 */
  document.getElementById('fillFoot').innerHTML = ro
    ? `<button class="btn" onclick="closeFill()">关闭</button>`
    : `<button class="btn" onclick="closeFill()">取消</button><button class="btn primary" onclick="saveFill()">保存</button>`;
  setDev('pc');
  document.getElementById('fillMask').style.display='flex';
}
function closeFill(){ document.getElementById('fillMask').style.display='none'; }
function setDev(d){ const p=document.getElementById('fillPaper'); p.classList.toggle('mobile',d==='mobile'); document.getElementById('segPhone').classList.toggle('active',d==='mobile'); document.getElementById('segPc').classList.toggle('active',d!=='mobile'); }
function saveFill(){
  const cur=S.getForm(curId); const paper=document.getElementById('fillPaper');
  const values=E.collectValues(paper, cur);
  if(fillMode==='add'){ S.addSubmission({ id:S.uid('s'), formId:cur.id, createdAt:Date.now(), by:'录入员', values }); }
  else { const sub=S.getSubmissions(cur.id).find(x=>x.id===fillSubId); if(sub){ sub.values=values; sub.updatedAt=Date.now(); S.updateSubmission(sub); } }
  closeFill(); renderTable(cur); toastA(fillMode==='add'?'已新增数据':'已保存修改');
}

/* ---------- 简易确认 / 提示 ---------- */
function confirmA(msg){ return Promise.resolve(window.confirm(msg)); }
function toastA(t){ const d=document.createElement('div'); d.textContent=t; d.style.cssText='position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#2f3b4c;color:#fff;padding:9px 18px;border-radius:6px;z-index:300;font-size:13px'; document.body.appendChild(d); setTimeout(()=>d.remove(),1600); }

renderNav();
renderMain();
</script>
</body>
</html>
