<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>表单预览</title>
<link rel="stylesheet" href="shared/theme.css">
</head>
<body class="pv-wrap">
<div class="pv-toolbar">
  <div class="pv-seg">
    <button id="segPhone" onclick="setDev('mobile')">📱 手机</button>
    <button id="segPc" class="active" onclick="setDev('pc')">💻 电脑</button>
  </div>
</div>
<div class="pv-stage">
  <div id="paper" class="pv-paper"></div>
</div>
<script src="shared/store.js"></script>
<script src="shared/engine.js"></script>
<script>
let form=null;
try{ form=JSON.parse(localStorage.getItem('mjf_preview')); }catch(e){}
document.getElementById('paper').innerHTML = form ? MJ.Engine.renderForm(form, {interactive:true}) : '<div style="text-align:center;color:#8a97a8;padding:40px">无预览内容</div>';
function setDev(d){
  document.getElementById('paper').classList.toggle('mobile', d==='mobile');
  document.getElementById('segPhone').classList.toggle('active', d==='mobile');
  document.getElementById('segPc').classList.toggle('active', d==='pc');
}
</script>
</body>
</html>
